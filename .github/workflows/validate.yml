name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate registry
        run: npm run validate

      - name: Test
        run: npm test

      - name: Build artifacts
        run: npm run build

      - name: Public-safety scan
        run: npm run scan:public-safety
