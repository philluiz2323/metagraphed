name: README catalog refresh

# Regenerate the README subnet catalog (#1020) from the curated overlays whenever
# they change on main, and accumulate any drift into a single chore/readme-catalog
# PR (peter-evans reuses the same branch). This is the PRIMARY owner of README
# catalog freshness: the catalog is DATA-derived and is NOT gated on contributor
# PRs (gating it red-lined build-less surface PRs that legitimately change a
# subnet's catalog row), so every registry/subnets push lands here and refreshes
# the accumulator PR, which a maintainer merges periodically. The catalog is NOT
# regenerated on the 6h data refresh.
on:
  push:
    branches: [main]
    paths:
      - "registry/subnets/**"
      - "scripts/generate-registry-readme-section.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: readme-catalog-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Regenerate README catalog
        run: npm run readme:catalog

      - name: Open catalog refresh PR (no-op if unchanged)
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/readme-catalog
          delete-branch: true
          add-paths: README.md
          title: "docs(readme): refresh subnet catalog (#1020)"
          commit-message: "docs(readme): refresh subnet catalog (#1020)"
          body: |
            Auto-regenerated the README subnet catalog from the curated overlays
            in `registry/subnets/` (`npm run readme:catalog`, #1020). Opened
            because the committed catalog drifted from the overlays.
          labels: |
            docs
            automation
