name: Refresh Metagraph (per-UID neurons)

# Fetches the per-UID metagraph for every subnet FIRST-PARTY via the Bittensor SDK
# (#1348 — chain-direct, no Taostats, no API key) and loads it into the
# metagraphed-health D1 `neurons` table (#1303). Powers
# /api/v1/subnets/{netuid}/metagraph, /neurons/{uid}, /validators, and the account
# entity API (#1347). Daily + manual. The snapshot is signed (sign-staged-neurons)
# before staging to R2; the Worker authenticates + bounds it before loading into D1
# via its binding (loadStagedNeurons) — no API-token D1 permission required.
on:
  schedule:
    - cron: "23 5 * * *" # daily 05:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: refresh-metagraph
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # one get_all_metagraphs_info call + per-subnet storage reads
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      # First-party chain-direct fetch (pinned bittensor, matching sync-subnets):
      # get_all_metagraphs_info for the per-UID core + SubtensorModule.ValidatorTrust
      # storage; rank is derived from incentive. Units parity-verified vs the prior
      # Taostats source (#1348). No Taostats, no API key.
      - name: Fetch per-UID metagraph (Bittensor SDK)
        run: uvx --from bittensor==10.4.0 python scripts/fetch-metagraph-native.py
        env:
          # Same hidden chain-RPC secret as the events poller (ADR 0012 / #1349).
          # Unset → the script defaults to "finney"; set it to the private node URL
          # to route the metagraph fetch through our own infra without exposing it.
          SUBTENSOR_RPC_URL: ${{ secrets.SUBTENSOR_RPC_URL }}

      - name: Upload unsigned neuron snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: metagraph-neurons-unsigned
          path: dist/metagraph-neurons.json
          if-no-files-found: error
          retention-days: 1

  sign-and-stage:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Keep the secret-bearing job in a fresh workspace. The unpinned PyPI
      # execution boundary above can only pass the JSON data artifact forward, not
      # mutated repository scripts, shell startup files, or node_modules.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1

      - name: Install
        run: npm ci

      - name: Download unsigned neuron snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: metagraph-neurons-unsigned
          path: dist

      - name: Sign staged neuron snapshot
        run: node scripts/sign-staged-neurons.mjs dist/metagraph-neurons.json
        env:
          METAGRAPH_STAGING_SIGNING_KEY: ${{ secrets.METAGRAPH_STAGING_SIGNING_KEY }}

      # Stage the signed snapshot to R2 (the token's existing R2 permission); the
      # Worker authenticates + bounds it before loading into D1 via its binding.
      - name: Stage neurons to R2 for the Worker to load into D1
        run: npx wrangler r2 object put metagraphed-artifacts/metagraph/neurons-pending.json --file=dist/metagraph-neurons.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # #4771 verification window: ALSO write the same unsigned snapshot to the
      # new Postgres write path (workers/data-api.mjs's handleNeuronsSync),
      # alongside (not replacing) the R2/D1 step above. METAGRAPH_NEURONS_SOURCE
      # stays "d1" until a live parity pass confirms Postgres agrees with D1 --
      # this step only populates that comparison, it does not change what's
      # served. A failure here must never fail the D1 path this workflow's
      # whole job (and #1345's daily rollup cron) depends on -- NOT
      # `continue-on-error:` (banned repo-wide by validate-workflows.mjs as
      # failure-masking); instead the script itself always exits 0, logging a
      # failure loudly (::warning::) rather than swallowing it silently, and
      # skips cleanly until NEURONS_SYNC_SECRET is provisioned (same
      # not-yet-configured convention as notify-on-failure's webhook guard below).
      - name: Sync neurons to the Postgres write path (#4771, verification window)
        run: |
          if [ -z "$NEURONS_SYNC_SECRET" ]; then
            echo "NEURONS_SYNC_SECRET not set; skipping Postgres sync"
            exit 0
          fi
          curl -fsS -X POST "https://api.metagraph.sh/api/v1/internal/neurons-sync" \
            -H "x-neurons-sync-token: ${NEURONS_SYNC_SECRET}" \
            -H "content-type: application/json" \
            --data-binary @dist/metagraph-neurons.json \
            || echo "::warning::neurons-sync Postgres write failed; D1 path (this job's real dependency) is unaffected"
        env:
          NEURONS_SYNC_SECRET: ${{ secrets.NEURONS_SYNC_SECRET }}

  notify-on-failure:
    needs: [fetch, sign-and-stage]
    if: ${{ always() && (needs.fetch.result == 'failure' || needs.sign-and-stage.result == 'failure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify on failure
        env:
          METAGRAPH_ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$METAGRAPH_ALERT_WEBHOOK_URL" ]; then
            exit 0
          fi
          curl -fsS -X POST "$METAGRAPH_ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d '{"content":"🔴 metagraphed refresh-metagraph FAILED — the per-UID neurons D1 tier may go stale."}'
